<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafePaws | User</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style> body { font-family: 'Inter', sans-serif; } #map { height: 300px; border-radius: 0.75rem; } </style>
</head>
<body class="bg-teal-50 min-h-screen p-4">
  <div class="w-full max-w-lg mx-auto bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-3xl font-extrabold text-center text-teal-600 mb-6">Book Pet Transport</h1>
    
    <h2 class="text-lg font-bold mb-2">Pet Details</h2>
    <input id="pet-name" type="text" placeholder="Pet Name" class="w-full p-3 mb-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
    <input id="pet-type" type="text" placeholder="Pet Type - Dog, Cat, Other" class="w-full p-3 mb-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
    <input id="weight" type="text" placeholder="Weight Class - Small, Medium, Large" class="w-full p-3 mb-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
    <textarea id="medical" placeholder="Medical History Notes" class="w-full p-3 mb-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"></textarea>
    
    <h2 class="text-lg font-bold mb-2 mt-4">Pickup & Dropoff</h2>
    <input id="pickup" type="text" placeholder="Pickup Address" class="w-full p-3 mb-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
    <input id="dropoff" type="text" placeholder="Dropoff Address" class="w-full p-3 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
    
    <div id="map" class="mb-4"></div>
    
    <button id="book-btn" class="w-full bg-teal-600 text-white font-bold p-3 rounded-lg hover:bg-teal-700">Book Now</button>
    <p id="book-status" class="text-center mt-4 font-semibold"></p>
    
    <a href="#" id="logout" class="block text-center mt-4 text-red-600 font-semibold">Logout</a>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
      authDomain: "safepaws-batangas.firebaseapp.com",
      projectId: "safepaws-batangas",
      storageBucket: "safepaws-batangas.firebasestorage.app",
      messagingSenderId: "629904615191",
      appId: "1:629904615191:web:45f7148d65ba61a867f952"
    };
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    const map = L.map('map').setView([13.7565, 121.0583], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    onAuthStateChanged(auth, (user) => { if (!user) { window.location.href = 'index.html'; } });
    
    document.getElementById('book-btn').addEventListener('click', async () => {
      const petName = document.getElementById('pet-name').value; 
      const petType = document.getElementById('pet-type').value; 
      const weight = document.getElementById('weight').value; 
      const medical = document.getElementById('medical').value; 
      const pickup = document.getElementById('pickup').value; 
      const dropoff = document.getElementById('dropoff').value; 
      const statusEl = document.getElementById('book-status');
      
      if (!petName || !pickup || !dropoff) { statusEl.textContent = 'Please fill in Pet Name, Pickup, and Dropoff.'; statusEl.className = 'text-center mt-4 text-red-600 font-semibold'; return; }
      
      try {
        await addDoc(collection(db, "bookings"), { 
          petName, petType, weightClass: weight, medicalHistory: medical, 
          pickup, dropoff, status: 'pending', createdAt: serverTimestamp(), userId: auth.currentUser.uid 
        });
        statusEl.textContent = 'Booking submitted successfully!'; 
        statusEl.className = 'text-center mt-4 text-green-600 font-semibold';
        document.getElementById('pet-name').value = ''; document.getElementById('pet-type').value = ''; 
        document.getElementById('weight').value = ''; document.getElementById('medical').value = '';
        document.getElementById('pickup').value = ''; document.getElementById('dropoff').value = '';
      } catch (e) { statusEl.textContent = 'Error: ' + e.message; statusEl.className = 'text-center mt-4 text-red-600 font-semibold'; }
    });

    document.getElementById('logout').onclick = () => signOut(auth).then(() => window.location.href = 'index.html');
  </script>
</body>
</html>
