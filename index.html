<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafePaws - Pet Owner</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--teal:#008080;--red:#DC2626;--bg:#F0FDFD}
*{box-sizing:border-box}
body{font-family:Poppins;background:var(--bg);margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.box{background:white;padding:28px;border-radius:16px;box-shadow:0 8px 20px rgba(0,0,0,0.08);width:100%;max-width:420px}
h2{color:var(--teal);text-align:center;margin:0 0 20px 0;font-weight:700}
input,select,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1.5px solid #E5E7EB;font-family:Poppins;font-size:15px}
button{background:var(--teal);color:white;border:none;font-weight:600;cursor:pointer}
button.red{background:var(--red)}
.link{color:var(--teal);font-weight:600;cursor:pointer;text-align:center;display:block;margin-top:12px;font-size:14px}
.hidden{display:none}
label{font-size:14px;display:flex;align-items:center;gap:8px;margin:8px 0}
#authError{color:var(--red);font-size:13px;margin-top:8px;text-align:center;min-height:18px}
</style>
</head>
<body>
<div id="authBox" class="box">
  <h2 id="authTitle">SafePaws Pet Owner</h2>
  <input id="email" placeholder="Email" type="email">
  <input id="password" placeholder="Password" type="password">
  <input id="username" placeholder="Full Name" class="hidden">
  <button id="authBtn" onclick="login()">Sign In</button>
  <span class="link" onclick="toggleAuth()">New? Create Account</span>
  <div id="authError"></div>
</div>

<div id="userBox" class="box hidden">
  <h2>Book a Pet Ride 🚗</h2>
  <p style="text-align:center;margin-top:-10px">Hi <b id="userName"></b></p>
  <input id="petName" placeholder="Pet Name e.g. Bantay" required>
  <input id="petWeight" placeholder="Pet Weight in kg" type="number">
  <input id="petMedical" placeholder="Medical Notes / Issue">
  <select id="shopId"><option value="batangas-petcare">Batangas Petcare Clinic</option><option value="lemery-vet">Lemery Vet Shop</option></select>
  <input id="total" placeholder="Estimated Fare ₱" type="number" required>
  <label><input type="checkbox" id="isEmergency"> 🚨 Emergency Ride</label>
  <button onclick="book()">Book Now</button>
  <button class="red" onclick="logout()">Logout</button>
</div>

<script type="module">
// ====== CONFIG DITO BOI - PALITAN MO LANG TO ======
const firebaseConfig = {apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",authDomain: "safepaws-batangas.firebaseapp.com",projectId: "safepaws-batangas",storageBucket: "safepaws-batangas.firebasestorage.app",messagingSenderId: "629904615191",appId: "1:629904615191:web:45f7148d65ba61a867f952};
// ==================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
let isLoginMode=true, userId=null;
window.toggleAuth = () => {isLoginMode=!isLoginMode;authTitle.innerText=isLoginMode?'SafePaws Pet Owner':'Create Pet Owner Account';authBtn.innerText=isLoginMode?'Sign In':'Sign Up';username.classList.toggle('hidden',isLoginMode);authBtn.onclick=isLoginMode?login:signup;authError.innerText='';};
window.login = async () => {try{const cred=await signInWithEmailAndPassword(auth,email.value,password.value);const userDoc=await getDoc(doc(db,"users",cred.user.uid));const data=userDoc.data();if(!data || data.status!=='Approved'){alert('Account not approved yet');signOut(auth);return;}if(data.role!=='customer'){alert('❌ Wrong App. This is for Pet Owners only.');signOut(auth);return;}userId=cred.user.uid;userName.innerText=data.username;authBox.classList.add('hidden');userBox.classList.remove('hidden');}catch(e){authError.innerText=e.message}};
window.signup = async () => {try{if(!username.value)return alert('Full Name required');const cred=await createUserWithEmailAndPassword(auth,email.value,password.value);await updateProfile(cred.user,{displayName:username.value});await setDoc(doc(db,"users",cred.user.uid),{email:email.value,username:username.value,role:'customer',status:'Approved',createdAt:Date.now()});alert('Account Created! You can sign in now.');toggleAuth();}catch(e){authError.innerText=e.message}};
window.logout = async () => {await signOut(auth);userBox.classList.add('hidden');authBox.classList.remove('hidden');email.value='';password.value='';username.value='';};
window.book = async () => {if(!petName.value ||!total.value)return alert('Fill Pet Name and Fare');await addDoc(collection(db,"bookings"),{userId,petName:petName.value,petWeight:petWeight.value,petMedical:petMedical.value,shopId:shopId.value,total:Number(total.value),isEmergency:isEmergency.checked,status:'pending',driverId:null,driverLocation:null,createdAt:Date.now()});alert('✅ Booking Sent! Wait for a driver to accept.');petName.value='';petWeight.value='';petMedical.value='';total.value='';isEmergency.checked=false;};
</script>
</body>
</html>
