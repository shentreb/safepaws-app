<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePaws Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } .hidden { display: none; } </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div id="auth-container" class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
        <h1 class="text-3xl font-extrabold text-center text-indigo-600 mb-2">SafePaws</h1>
        <div id="login-form">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Login</h2>
            <input id="login-email" type="email" placeholder="Email" class="w-full p-3 mb-3 border rounded-lg">
            <input id="login-password" type="password" placeholder="Password" class="w-full p-3 mb-4 border rounded-lg">
            <button id="login-btn" class="w-full bg-indigo-600 text-white font-bold p-3 rounded-lg">Login</button>
            <p class="text-center mt-4 text-sm">Wala pa? <a href="#" id="show-signup" class="text-indigo-600 font-semibold">Sign Up</a></p>
            <p id="login-error" class="text-red-500 text-sm mt-2 text-center"></p>
        </div>
        <div id="signup-form" class="hidden">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Sign Up</h2>
            <input id="signup-email" type="email" placeholder="Email" class="w-full p-3 mb-3 border rounded-lg">
            <input id="signup-password" type="password" placeholder="Password 6+ chars" class="w-full p-3 mb-4 border rounded-lg">
            <button id="signup-btn" class="w-full bg-green-600 text-white font-bold p-3 rounded-lg">Sign Up</button>
            <p class="text-center mt-4 text-sm">May account na? <a href="#" id="show-login" class="text-indigo-600 font-semibold">Login</a></p>
            <p id="signup-error" class="text-red-500 text-sm mt-2 text-center"></p>
        </div>
    </div>
    <div id="app-container" class="hidden w-full max-w-md bg-white rounded-2xl shadow-lg p-8 text-center">
        <h2 class="text-2xl font-bold mb-4">Success ✅</h2>
        <a href="admin.html" class="block w-full bg-indigo-600 text-white font-bold p-3 rounded-lg mb-2">Go to Admin</a>
        <a href="driver.html" class="block w-full bg-gray-600 text-white font-bold p-3 rounded-lg">Go to Driver</a>
        <button id="logout-btn" class="w-full bg-red-600 text-white font-bold p-3 rounded-lg mt-2">Logout</button>
    </div>
    <script type="module">
        const firebaseConfig = { apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
  authDomain: "safepaws-batangas.firebaseapp.com",
  projectId: "safepaws-batangas",
  storageBucket: "safepaws-batangas.firebasestorage.app",
  messagingSenderId: "629904615191",
  appId: "1:629904615191:web:45f7148d65ba61a867f952" };
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const loginForm = document.getElementById('login-form'); const signupForm = document.getElementById('signup-form'); const authContainer = document.getElementById('auth-container'); const appContainer = document.getElementById('app-container');
        document.getElementById('show-signup').addEventListener('click', (e) => { e.preventDefault(); loginForm.classList.add('hidden'); signupForm.classList.remove('hidden'); });
        document.getElementById('show-login').addEventListener('click', (e) => { e.preventDefault(); signupForm.classList.add('hidden'); loginForm.classList.remove('hidden'); });
        document.getElementById('signup-btn').addEventListener('click', () => { const email = document.getElementById('signup-email').value; const password = document.getElementById('signup-password').value; const errorEl = document.getElementById('signup-error'); createUserWithEmailAndPassword(auth, email, password).then(() => { errorEl.textContent = ''; }).catch((error) => { errorEl.textContent = error.message; }); });
        document.getElementById('login-btn').addEventListener('click', () => { const email = document.getElementById('login-email').value; const password = document.getElementById('login-password').value; const errorEl = document.getElementById('login-error'); signInWithEmailAndPassword(auth, email, password).then(() => { errorEl.textContent = ''; }).catch((error) => { errorEl.textContent = error.message; }); });
        document.getElementById('logout-btn').addEventListener('click', () => { signOut(auth); });
        onAuthStateChanged(auth, (user) => { if (user) { authContainer.classList.add('hidden'); appContainer.classList.remove('hidden'); } else { authContainer.classList.remove('hidden'); appContainer.classList.add('hidden'); } });
    </script>
</body>
</html>
